name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Update root package version
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # Update workspace packages
          npm version "$VERSION" --no-git-tag-version --allow-same-version --workspaces

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Test
        run: npm test

      - name: Generate release notes
        id: notes
        uses: github/copilot-release-notes@v1
        with:
          base-ref: ${{ env.VERSION }}
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          model: claude-sonnet-4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.notes.outputs.release-notes }}

      - name: Publish to npm
        run: npm publish --workspace=packages/daemon
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
